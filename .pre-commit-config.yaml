# Pre-commit hooks for faultray-app
#
# Purpose: prevent accidental commits of secrets, lint issues, and large files.
# Created: 2026-04-09 (problems.md Rev 4 C2/C3 Deferred 残タスク)
#
# Setup:
#   pip install pre-commit detect-secrets
#   pre-commit install
#   detect-secrets scan > .secrets.baseline
#   git add .pre-commit-config.yaml .secrets.baseline
#
# Manual run:
#   pre-commit run --all-files
#
# Why detect-secrets:
#   - Catches accidentally-committed credentials before they reach the repo
#   - Required by problems.md Rev 4 C2/C3 (the only remaining task after
#     user-approved skip of secret rotation, 2026-04-09)
#   - Backed by Yelp engineering, well-maintained, low false positive rate

repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - "--baseline"
          - ".secrets.baseline"
        # Exclude paths that are expected to contain placeholder values
        exclude: |
          (?x)^(
              \.env\..*\.example|
              \.env\.example|
              package-lock\.json|
              .*\.lock|
              .*\.test\.tsx?|
              .*\.spec\.tsx?
          )$

  # Generic safety checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      # #43: feature-branch + PR workflow is now the norm (every P1/P2
      # task lands via PR since 2026-04-19). Enforce that by blocking
      # direct commits to main / develop. Emergency hotfixes can still
      # bypass via `git commit --no-verify`, but that is audit-visible
      # and requires explicit justification.
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "develop"]
