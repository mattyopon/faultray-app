name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# GHACT-01: Use set -euo pipefail to fail on any command error
defaults:
  run:
    shell: bash

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Run ESLint
        run: |
          set -euo pipefail
          npm run lint

      - name: Run TypeScript type check
        run: |
          set -euo pipefail
          npx tsc --noEmit

  test-frontend:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Run Vitest
        run: |
          set -euo pipefail
          npm run test -- --run

  test-python:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        # GHACT-05: Cache pip dependencies via setup-python@v5 cache param above
        run: |
          set -euo pipefail
          pip install -r requirements.txt pytest

      - name: Run pytest
        run: |
          set -euo pipefail
          python -m pytest tests/ -q --tb=short --ignore=tests/e2e_buttons.py || ([ $? -eq 5 ] && echo "No Python tests found — skipping" && exit 0)

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_API_URL: ""
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
