name: OWASP ZAP Baseline Scan

on:
  workflow_dispatch:
  push:
    branches: [develop]

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: "https://faultray.com"
          fail_action: false
          artifact_name: zap-report-${{ github.sha }}
