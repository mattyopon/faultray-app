# DOCKER-01: Production docker-compose — separated from any development overrides
# Usage: docker compose -f docker-compose.prod.yml up -d
version: "3.9"

services:
  web:
    # DOCKER-02: Pin to exact digest in production for reproducibility
    # Update digest when upgrading: docker pull node:20-alpine && docker inspect --format='{{index .RepoDigests 0}}' node:20-alpine
    image: node:20-alpine
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://faultray.com}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # SCALE-02: リソース上限 — 最小構成(1GB/1CPU)から適切なスケールに引き上げ
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  engine:
    image: python:3.11-slim
    build:
      context: .
      dockerfile: Dockerfile.engine.prod
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - PYTHON_ENV=production
      # DOCKER-03: CORS設定 — 本番では faultray.com からのみ許可
      - ALLOWED_ORIGINS=${NEXT_PUBLIC_SITE_URL:-https://faultray.com}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # SCALE-02: エンジンは計算集約型 — 4CPU/4GBを確保
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# SCALE-03: Supabase PgBouncer接続プール設定メモ
# Supabase側で以下を有効化すること:
# - Connection pooling: Transaction mode
# - Pool size: 20 (Freeプラン) / 50 (Proプラン以上)
# - ダッシュボード: https://supabase.com/dashboard/project/_/settings/database
# - 接続文字列: postgresql://postgres.[ref]:[pass]@aws-0-[region].pooler.supabase.com:6543/postgres
